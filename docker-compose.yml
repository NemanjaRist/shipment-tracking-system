services:
  postgres:
    image: postgres:16
    container_name: shipment-postgres
    environment:
      POSTGRES_DB: shipment_tracking
      POSTGRES_USER: shipment_user
      POSTGRES_PASSWORD: shipment_password
    ports:
      - "5433:5432"
    volumes:
      - shipment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipment_user -d shipment_tracking"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: shipment-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shipment_tracking
      DB_USERNAME: shipment_user
      DB_PASSWORD: shipment_password
    ports:
      - "8080:8080"

volumes:
  shipment_postgres_data: